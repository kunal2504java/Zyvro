<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=http://localhost:3000">
    <title>Redirecting to Dashboard...</title>
    <script>
        // Try to redirect to Next.js dev server first
        window.location.href = 'http://localhost:3000';
    </script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting to Dashboard...</p>
        <p style="color: #666; font-size: 14px;">If not redirected, <a href="http://localhost:3000" style="color: #22c55e;">click here</a></p>
    </div>
</body>
</html>
